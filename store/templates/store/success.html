{% extends "store/index.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 text-center mt-5">
        <div class="display-1 text-success mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" fill="currentColor" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
              <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
            </svg>
        </div>
        <h2 class="mb-3">Payment Successful!</h2>
        <p class="lead mb-4">Thank you for your purchase. Your order for <strong>{{ order.product.name }}</strong> has been confirmed.</p>
        
        <div class="card bg-light mb-4 text-start shadow-sm mx-auto" style="max-width: 400px;">
            <div class="card-body">
                <h5 class="card-title text-center text-muted">Order Details</h5>
                <hr>
                <div class="d-flex justify-content-between">
                    <span>Order Number:</span>
                    <span class="fw-bold">#{{ order.id }}</span>
                </div>
                <div class="d-flex justify-content-between mt-2">
                    <span>Amount Paid:</span>
                    <span class="fw-bold text-success">₹{{ order.total_price_cents|add:"0" }}</span>
                </div>
            </div>
        </div>

        <a href="{% url 'index' %}" class="btn btn-primary btn-lg px-5">Back to Store</a>
    </div>
</div>
{% endblock %}
